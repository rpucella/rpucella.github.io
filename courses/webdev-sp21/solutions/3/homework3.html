<!DOCTYPE html>
<html>
  
  <meta charset="utf-8"> 
  
  <head>
    
    <title>Homework 3</title>

    <link rel="stylesheet" href="homework3.css">

    <script src="homework3.js"></script>
    
  </head>

  
  <body>
    
    <div class="tabs">
      <div class="sep"></div>
      <div class="tab" id="initial-tab">Question 1</div>
      <div class="sep"></div>
      <div class="tab">Question 2</div>
      <div class="sep"></div>
      <div class="tab">Question 3</div>
      <div class="sep"></div>
      <div class="tab">Question 5</div>
      <div class="sep"></div>
    </div>

    
    <div class="tab-content" id="tab-0">
      <div class="subtitle">
	Table Example
      </div>

      <div class="centered">
        <table id="test-original">
        </table>
      </div>
    </div>


    
    <div class="tab-content" id="tab-1">
      <div class="subtitle">
	Sortable Table Example
      </div>

      <div class="centered">
        <table id="test">
        </table>
      </div>
    </div>


    
    <div class="tab-content" id="tab-2">
      <div class="subtitle">
	Filterable List Example
      </div>

      <div class="centered">
        <div>
          <label for="test-input">Filter:</label>
          <input type="text" id="test-input">

          <div id="test-list" class="narrow">
          </div>
        </div>
      </div>
    </div>


    
    <div class="tab-content" id="tab-3">
      <div class="subtitle">
	Editable Table Example
      </div>
      
      <div class="centered">
	<table id="test-table">
	  <thead>
            <tr>
              <th>Name</th>
              <th>Age</th>
              <th>Profession</th>
            </tr>
	  </thead>
	  <tbody>
            <tr>
              <td>Alice</td>
              <td>25</td>
              <td>Software Engineer</td>
            </tr>
            <tr>
              <td>Bob</td>
              <td>30</td>
              <td>Builder</td>
            </tr>
            <tr>
              <td>Charlie</td>
              <td>21</td>
              <td>Painter</td>
            </tr>
            <tr>
              <td>Darlene</td>
              <td>32</td>
              <td>Singer</td>
            </tr>
	  </tbody>
	</table>
      </div>
    </div>
    
  </body>
  
</html>
